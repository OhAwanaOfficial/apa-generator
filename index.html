<!DOCTYPE html>
<html>
<head>
    <title>APA Citation Generator</title>
</head>
<body>

<h1>APA Citation Generator</h1>

<form id="form">
    <input type="text" id="author" placeholder="Author(s) (comma separated)" required><br><br>
    
    <input type="number" id="year" placeholder="Year" required><br><br>
    
    <input type="text" id="title" placeholder="Title" required><br><br>
    
    <input type="text" id="publisher" placeholder="Publisher"><br><br>
    
    <input type="text" id="url" placeholder="URL"><br><br>

    <select id="source_type">
        <option value="book">Book</option>
        <option value="website">Website</option>
        <option value="journal">Journal</option>
    </select><br><br>

    <button type="submit">Generate Citation</button>
</form>

<h2 id="result"></h2>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        author: document.getElementById("author").value,
        year: parseInt(document.getElementById("year").value),
        title: document.getElementById("title").value,
        publisher: document.getElementById("publisher").value,
        url: document.getElementById("url").value,
        source_type: document.getElementById("source_type").value
    };

    const response = await fetch("http://127.0.0.1:8000/apa", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerText = result.citation || result.error;
});
</script>

</body>
</html>
